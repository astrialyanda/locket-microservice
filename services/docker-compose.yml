services:
  post-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: post
      POSTGRES_PASSWORD: post
      POSTGRES_DB: post
    volumes:
      - post_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U post"]
      interval: 5s
      timeout: 3s
      retries: 5

  feed-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feed
      POSTGRES_PASSWORD: feed
      POSTGRES_DB: feed
    volumes:
      - feed_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feed"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  post-service:
    build: ./post-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://post:post@post-db:5432/post
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      post-db:
        condition: service_healthy

  feed-service:
    build: ./feed-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://feed:feed@feed-db:5432/feed
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      feed-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      post-service:
        condition: service_started

volumes:
  post_pgdata:
  feed_pgdata:
